<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Discord WebSocket</title>
    <style>
        body { font-family: Arial, sans-serif; background: #2c2f33; color: white; padding: 20px; }
        #chat-box { width: 100%; height: 300px; border: 1px solid #7289da; background: #23272a; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        input { width: 75%; padding: 10px; }
        button { padding: 10px 20px; background: #7289da; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<h2>💬 Mini-Discord (Live Chat)</h2>
<div id="chat-box"></div>

<input type="text" id="message-input" placeholder="Type a message...">
<button onclick="sendMessage()">Send</button>

<script>
    // 1. Establish the connection to Spring Boot
    const socket = new WebSocket('ws://localhost:8090/chat');
    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');

    // 2. Listen for incoming broadcasts from the server
    socket.onmessage = function(event) {
        const newMessage = document.createElement('div');
        newMessage.textContent = "User: " + event.data;
        chatBox.appendChild(newMessage);
        chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
    };

    // 3. Send messages to the server
    function sendMessage() {
        const text = messageInput.value;
        if(text.trim() !== "") {
            socket.send(text); // Pushes data through the WebSocket pipe
            messageInput.value = ''; // Clear the input box
        }
    }

    // Allow pressing "Enter" to send
    messageInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });
</script>
</body>
</html>
